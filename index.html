<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="card-header">
          <h1>Create Account</h1>
          <p>Fill in your details to get started</p>
        </div>

        <div class="success-banner" id="success-banner">
          <span id="success-message"></span>
        </div>

        <form id="form-validate" novalidate>
          <div class="form-group">
            <label for="userName">Full Name</label>
            <div class="input-wrapper">
              <input
                type="text"
                id="userName"
                placeholder="John Doe"
                autocomplete="name"
              />
            </div>
            <span class="error-msg" id="uName-error" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <input
                type="email"
                id="email"
                placeholder="john@example.com"
                autocomplete="email"
              />
            </div>
            <span class="error-msg" id="mail-error" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                placeholder="Min 6 characters"
                autocomplete="new-password"
              />
              <button type="button" class="toggle-password" data-target="password">
                Show
              </button>
            </div>
            <div class="password-strength" id="password-strength">
              <div class="strength-bar">
                <div class="strength-fill" id="strength-fill"></div>
              </div>
              <span class="strength-text" id="strength-text"></span>
            </div>
            <span class="error-msg" id="password-error" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="confirmPassword"
                placeholder="Re-enter password"
                autocomplete="new-password"
              />
              <button type="button" class="toggle-password" data-target="confirmPassword">
                Show
              </button>
            </div>
            <span class="error-msg" id="cPassword-error" aria-live="polite"></span>
          </div>

          <button type="submit" class="submit-btn" id="submit-btn">
            Create Account
          </button>
        </form>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
